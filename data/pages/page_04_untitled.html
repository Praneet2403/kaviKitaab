<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untitled — kaviKitaab by Bushi</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Newsreader', 'Georgia', serif;
      background: #fbf9f4;
      color: #1b1c19;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border-left: 4px solid rgba(0,0,0,0.05);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.08),
                  inset 10px 0 15px -10px rgba(0,0,0,0.1),
                  inset -10px 0 15px -10px rgba(0,0,0,0.1);
      padding: 4rem 3.5rem;
      position: relative;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .page-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      opacity: 0.4;
    }
    .page-brand {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      opacity: 0.2;
      text-transform: uppercase;
    }
    .content {
      font-size: 1.25rem;
      line-height: 2.2;
      white-space: pre-wrap;
    }
    .content p {
      margin-bottom: 0.5em;
    }
    .page-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      opacity: 0.2;
    }
    .meta {
      margin-top: 2rem;
      font-size: 0.55rem;
      opacity: 0.15;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <span class="page-title">Untitled</span>
      <span class="page-brand">kaviKitaab</span>
    </div>

    <div class="content">
        <br/>
    </div>

    <div class="page-footer">
      <span>Page 4</span>
      <span>7 pages in volume</span>
    </div>
  </div>

  <div class="meta">
    kaviKitaab by Bushi · Last saved: 20 April 2026 at 3:45 am
  </div>
</body>
</html>
